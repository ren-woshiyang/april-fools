<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>记住日期</title>
  <!-- 这一行很重要，确保手机按比例显示，而不是缩成电脑网页的样子 -->
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    /* 遮罩层样式 */
    #intro {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: white;
      color: black;
      text-align: center;
      z-index: 999;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    
    /* 遮罩层里的文字 */
    #intro h2 {
      font-size: 32px; /* 标题加大 */
      margin-bottom: 20px;
      color: #d32f2f;  /* 稍微加点红色警示感 */
    }
    #loadingText {
      font-size: 24px; /* 加载文字加大 */
      margin-top: 10px;
      color: #555;
    }

    /* 网页主体背景 */
    body {
      background: white;
      color: rgb(0, 0, 0);
      text-align: center;
      font-family: -apple-system, "Helvetica", "Arial", sans-serif; /* 适配苹果/安卓字体 */
      margin: 0; /* 去掉默认边距 */
      padding-bottom: 50px; /* 底部留点空隙 */
    }

    /* 图片样式 */
    img {
      width: 90%;           /* 图片宽度 */
      max-height: 60vh;     /* 限制高度，防止太长 */
      object-fit: contain;  /* 保持比例 */
      display: block;
      margin: 20px auto;    /* 上下间距加大 */
      border-radius: 10px;  /* 图片圆角 */
    }

    /* 中间的文字说明 */
    .text {
      margin: 25px 20px;    /* 左右留边距，防止文字贴边 */
      font-size: 24px;      /* 字号加大 (原为20px) */
      line-height: 1.5;     /* 行高加大，阅读更舒服 */
      font-weight: bold;    /* 加粗一点 */
    }

    /* 按钮样式 - 重点修改 */
    button {
      width: 85%;           /* 按钮宽度占屏幕85% */
      padding: 18px 0;      /* 按钮高度增加，更好点击 */
      margin: 15px auto;    /* 居中 */
      font-size: 20px;      /* 按钮文字加大 (原为18px) */
      cursor: pointer;
      border-radius: 15px;  /* 圆角更大 */
      background-color: #0e3b79;
      color: white;
      border: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2); /* 阴影更深一点 */
      transition: transform 0.1s;
    }

    /* 按钮点击动画 */
    button:active {
      transform: scale(0.96); /* 点击时缩小一点点 */
      background-color: #0a2c5a; /* 颜色变深 */
    }
  </style>
</head>

<body>
<!-- 开头的遮罩 -->
<div id="intro">
  <div>
    <h2>你真的要看吗！？？</h2>
    <p id="loadingText">正在加载中...</p>
  </div>
</div>

<!-- 主图 -->
<img id="image" src="pic1.jpg">

<!-- 文字 -->
<div class="text" id="text">
  你是来祝我生日快乐的吗？
</div>

<!-- 按钮区域 -->
<div id="choices">
  <button onclick="chooseYes()">是的，生日快乐！！</button>
  <button onclick="chooseNo()">不是</button>
</div>

<script>
function chooseYes() {
  document.getElementById("image").src = "pic2.jpg";
  document.getElementById("text").innerText = "谢谢你，这些送给你";
  document.getElementById("choices").innerHTML =
  '<button onclick="showGifts()">谢谢</button>';
}

function chooseNo() {
  document.getElementById("image").src = "pic3.jpg";
  document.getElementById("text").innerText = "美丽的lady！";
  document.getElementById("choices").innerHTML =
  '<button onclick="nextStep()">你见过一些奇怪的照片吗</button>';
}

function showGifts() {
  document.getElementById("text").innerText = "别告诉山治,拜托啦";
  document.getElementById("image").style.display = "none";
  // 这里的图片我也稍微调大了一点点，看起来更清楚
  document.getElementById("choices").innerHTML =
  '<img src="gft1.jpg" style="width:180px;margin:10px;">' +
  '<img src="gft2.jpg" style="width:180px;margin:10px;">' +
  '<img src="gft3.jpg" style="width:180px;margin:10px;">';
}

function nextStep() {
  document.getElementById("image").src = "pic4.jpg";
  document.getElementById("text").innerText = "等等!!";
  document.getElementById("choices").innerHTML =
  '<button onclick="alert(\'愚人节快乐！\')">……</button>';
}

// 遮罩层消失逻辑
setTimeout(() => {
  document.getElementById("intro").style.display = "none";
}, 2500);

// 动态省略号效果
let dots = 0;
setInterval(() => {
  dots = (dots + 1) % 4;
  document.getElementById("loadingText").innerText =
  "正在加载中" + ".".repeat(dots);
}, 500);
</script>

</body>
</html>
