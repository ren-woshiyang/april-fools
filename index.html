<!DOCTYPE html>
<html lang="zh">
<head>
  <meta charset="UTF-8">
  <title>记住日期</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    #intro {
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: white; color: black;
      text-align: center; z-index: 999;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      padding: 20px;
    }
    #intro h2 { font-size: 32px; margin-bottom: 20px; color: #d32f2f; }
    #loadingText { font-size: 24px; margin-top: 10px; color: #555; }
    body {
      background: white; color: rgb(0, 0, 0);
      text-align: center; font-family: -apple-system, "Helvetica", "Arial", sans-serif;
      margin: 0; padding-bottom: 50px;
    }
    img {
      width: 90%; max-height: 60vh; object-fit: contain;
      display: block; margin: 20px auto; border-radius: 10px;
    }
    .text {
      margin: 25px 20px; font-size: 24px; line-height: 1.5; font-weight: bold;
    }
    button {
      width: 85%; padding: 18px 0; margin: 15px auto;
      font-size: 20px; cursor: pointer; border-radius: 15px;
      background-color: #0e3b79; color: white; border: none;
      box-shadow: 0 4px 8px rgba(0,0,0,0.2); transition: transform 0.1s;
    }
    button:active { transform: scale(0.96); background-color: #0a2c5a; }
  </style>
</head>

<body>
<div id="intro">
  <div>
    <h2>你真的要看吗！？？</h2>
    <p id="loadingText">正在加载中...</p>
  </div>
</div>

<img id="image" src="pic1.jpg">

<div class="text" id="text">
  你是来祝我生日快乐的吗？
</div>

<div id="choices">
  <button onclick="chooseYes()">是的，生日快乐！！</button>
  <button onclick="chooseNo()">不是</button>
</div>

<script>
// --- 核心修复：预加载图片 ---
// 网页一打开，就在后台悄悄下载 pic2, pic3, pic4
// 这样点击按钮时，图片是瞬间显示的，不会卡顿
function preloadImages() {
  const images = ['pic2.jpg', 'pic3.jpg', 'pic4.jpg', 'gft1.jpg', 'gft2.jpg', 'gft3.jpg'];
  images.forEach(src => {
    const img = new Image();
    img.src = src;
  });
}
// 页面加载完成后立即执行预加载
window.addEventListener('load', preloadImages);

// --- 核心修复：防缓存函数 ---
// 给图片地址加上当前时间，强制浏览器下载新图
function getImgSrc(name) {
  return name + '?t=' + new Date().getTime();
}

function chooseYes() {
  document.getElementById("image").src = getImgSrc("pic2.jpg");
  document.getElementById("text").innerText = "谢谢你，这些送给你";
  document.getElementById("choices").innerHTML = '<button onclick="showGifts()">谢谢</button>';
}

function chooseNo() {
  document.getElementById("image").src = getImgSrc("pic3.jpg");
  document.getElementById("text").innerText = "美丽的lady！";
  document.getElementById("choices").innerHTML = '<button onclick="nextStep()">你见过一些奇怪的照片吗</button>';
}

function showGifts() {
  document.getElementById("text").innerText = "别告诉山治,拜托啦";
  document.getElementById("image").style.display = "none";
  document.getElementById("choices").innerHTML =
  '<img src="' + getImgSrc("gft1.jpg") + '" style="width:180px;margin:10px;">' +
  '<img src="' + getImgSrc("gft2.jpg") + '" style="width:180px;margin:10px;">' +
  '<img src="' + getImgSrc("gft3.jpg") + '" style="width:180px;margin:10px;">';
}

function nextStep() {
  document.getElementById("image").src = getImgSrc("pic4.jpg");
  document.getElementById("text").innerText = "等等!!";
  document.getElementById("choices").innerHTML = '<button onclick="alert(\'愚人节快乐！\')">……</button>';
}

setTimeout(() => {
  document.getElementById("intro").style.display = "none";
}, 2500);

let dots = 0;
setInterval(() => {
  dots = (dots + 1) % 4;
  document.getElementById("loadingText").innerText = "正在加载中" + ".".repeat(dots);
}, 500);
</script>

</body>
</html>
